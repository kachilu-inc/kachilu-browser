name: Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v$VERSION"
          ACTUAL_TAG="${GITHUB_REF_NAME}"
          echo "Local version: $VERSION"
          echo "Git ref: $ACTUAL_TAG"
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "Error: tag $ACTUAL_TAG does not match package.json version $EXPECTED_TAG"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Validate package already exists on npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          if npm view "$PACKAGE_NAME" version >/tmp/npm-package-version.txt 2>/tmp/npm-package-version.err; then
            echo "Trusted Publishing ready for existing package: $PACKAGE_NAME@$(cat /tmp/npm-package-version.txt)"
            exit 0
          fi

          echo "::error title=Initial npm publish required::Trusted Publishing cannot create the first npm package entry for $PACKAGE_NAME."
          echo "::error::Publish $PACKAGE_NAME once manually with npm CLI, then configure Trusted Publisher in npm package settings."

          if grep -q 'Unpublished on' /tmp/npm-package-version.err; then
            echo "::error::npm blocks republishing an unpublished package name for 24 hours. Wait for the cooldown, then run manual npm publish."
          fi

          cat /tmp/npm-package-version.err
          exit 1

      - name: Verify pack contents
        run: npm pack --dry-run

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
